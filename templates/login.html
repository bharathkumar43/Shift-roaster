<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <style>
        body { background: var(--bg, #f0f2f5); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { border-radius: 1rem; box-shadow: 0 8px 40px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, #1a1a2e, #0f3460); border-radius: 1rem;
                      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh">
    <div class="card login-card border-0">
                <div class="card-body p-5">
                    <div class="login-logo">
                        <i class="bi bi-bar-chart-line text-white fs-3"></i>
                    </div>
                    <h4 class="text-center fw-bold mb-1">{{ app_name }}</h4>
                    <p class="text-center text-muted small mb-4">Sign in to your account</p>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('login') }}">
                        <input type="hidden" name="next" value="{{ next }}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" name="username"
                                       placeholder="Enter username" required autofocus autocomplete="username">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" name="password" id="pwInput"
                                       placeholder="Enter password" required autocomplete="current-password">
                                <button class="btn btn-outline-secondary" type="button" id="togglePw" tabindex="-1">
                                    <i class="bi bi-eye" id="togglePwIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>

                </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('togglePw').addEventListener('click', function () {
    var inp = document.getElementById('pwInput');
    var icon = document.getElementById('togglePwIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
    }
});
</script>
</body>
</html>
